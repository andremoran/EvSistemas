services:
  - type: web
    name: alquileres-ecuador-api
    env: python
    region: oregon          # us-west-2 - mas cercano a Ecuador
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: model/modelo_alquileres.joblib
      - key: PYTHON_VERSION
        value: "3.11.0"
